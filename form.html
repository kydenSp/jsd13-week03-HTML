<html lang="en">
<head>

    <title>Registration Form</title>
</head>
<body>

    <p>order here</p>
    <form action="/api/order" method="post">
         <label
         >Customer Name:

        <p> Soup </p> 
        <label>
            Mala-Tang Soup
        <input type="radio" name="soup" id="mala-tang" checked/>
        </label>

        <label>

        </label>

            Tom-Yum Soup

        </label>

        <label>
            clear Soup

        </label>

        <p>ingredients</p>
        <label>
            Beef
            <input type="checkbox" name="ingredients" value="beef" />
        </label>

        <label>
            Pork
            <input type="checkbox" name="ingredients" value="pork" />
        </label>  
        
        <label>
            Chicken
            <input type="checkbox" name="ingredients" value="chicken" />
        </label>
        <button type="submit">Submit</button> </label> 
    </form>
